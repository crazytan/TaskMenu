<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 18" width="18" height="18">
  <defs>
    <!-- Mask: white = visible, black = cut out -->
    <mask id="checkCutout">
      <rect width="18" height="18" fill="white"/>
      <polyline points="4.5,9 7.5,12.5 13.5,5" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </mask>
  </defs>
  <!-- Black circle with checkmark punched out -->
  <circle cx="9" cy="9" r="8.5" fill="black" mask="url(#checkCutout)"/>
</svg>
