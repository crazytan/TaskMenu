name: TaskMenu
options:
  bundleIdPrefix: dev.crazytan
  deploymentTarget:
    macOS: "14.4"
  xcodeVersion: "26.4"
  generateEmptyDirectories: true

configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

settings:
  base:
    CURRENT_PROJECT_VERSION: "1"
    DEAD_CODE_STRIPPING: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.1"
    MACOSX_DEPLOYMENT_TARGET: "14.4"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
  configs:
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-Osize"

targets:
  TaskMenu:
    type: application
    platform: macOS
    sources:
      - path: TaskMenu
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.crazytan.TaskMenu
        INFOPLIST_FILE: TaskMenu/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: TaskMenu/Resources/TaskMenu.entitlements
        DEVELOPMENT_TEAM: V82M9YX8BR
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: YES
        PRODUCT_NAME: TaskMenu
        PROVISIONING_PROFILE_SPECIFIER: ""
    entitlements:
      path: TaskMenu/Resources/TaskMenu.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
  TaskMenuTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TaskMenuTests
    dependencies:
      - target: TaskMenu
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.crazytan.TaskMenuTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TaskMenu.app/Contents/MacOS/TaskMenu"
