name: TaskMenu
options:
  bundleIdPrefix: com.taskmenu
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.4"
  generateEmptyDirectories: true

configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

settings:
  base:
    CURRENT_PROJECT_VERSION: "1"
    DEAD_CODE_STRIPPING: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
  configs:
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-Osize"

targets:
  TaskMenu:
    type: application
    platform: macOS
    sources:
      - path: TaskMenu
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taskmenu.TaskMenu
        INFOPLIST_FILE: TaskMenu/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: TaskMenu/Resources/TaskMenu.entitlements
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        PRODUCT_NAME: TaskMenu
    entitlements:
      path: TaskMenu/Resources/TaskMenu.entitlements
  TaskMenuTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TaskMenuTests
    dependencies:
      - target: TaskMenu
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taskmenu.TaskMenuTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TaskMenu.app/Contents/MacOS/TaskMenu"
